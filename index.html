<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNACKE - Smart TV Game Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070808; 
            --primary: #E9E8D4;
            --verify-right: #13E19B;
            --verify-wrong: #F94627;
        }

        /* Base Setup & Typography */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Share Tech', sans-serif;
            overflow: hidden;
            display: flex;
            touch-action: none;
        }
        button, input {
            font-family: 'Share Tech', sans-serif;
            outline: none;
        }

        /* Layout Architecture (Ratios: 3 : 4 : 2 ) */
        .col {
            height: 100%;
            border-right: 2px solid var(--primary);
            display: flex;
            flex-direction: column;
            padding: 12px;
        }
        .col:last-child {
            border-right: none;
        }
        .col-left { flex: 3; }
        .col-mid { flex: 4; }
        .col-right { flex: 2; padding: 12px 8px; }

        /* --- LEFT COLUMN --- */
        .header h1 {
            text-align: center;
            font-size: 3rem;
            margin: 0 0 8px 0;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        .timer-display {
            font-size: 4rem;
            text-align: center;
            font-variant-numeric: tabular-nums;
            border: 2px solid var(--primary);
            padding: 5px;
            margin-bottom: 12px;
            border-radius: 8px;
        }
        .main-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .btn-ctrl {
            flex: 1;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            font-size: 1.3rem;
            height: 44px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-ctrl:active { background: var(--primary); color: var(--bg); }
        .btn-bold { 
            background: var(--primary); 
            color: var(--bg); 
            font-weight: bold; 
            line-height: 1; 
            padding: 0 5px;
        }
        .btn-bold:active { background: transparent; color: var(--primary); }

        .canvas-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            border: 2px solid var(--primary);
            position: relative;
            border-radius: 8px;
        }
        .canvas-inner { flex: 1; position: relative; }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }
        .canvas-tools {
            display: flex;
            border-top: 2px solid var(--primary);
        }
        .canvas-tools button {
            flex: 1;
            background: transparent;
            color: var(--primary);
            border: none;
            border-right: 2px solid var(--primary);
            height: 38px;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .canvas-tools button:last-child { border-right: none; }
        .canvas-tools button.active { background: var(--primary); color: var(--bg); }
        .canvas-tools button:active { opacity: 0.7; }

        /* --- MIDDLE COLUMN (12x12 SQUARE GRID) --- */
        .grid-centering {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            margin-bottom: 12px;
        }
        .grid-aspect-wrapper {
            height: 100%;
            aspect-ratio: 1 / 1; /* PERSEGI SEMPURNA */
            position: relative;
        }
        .grid-container {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(12, 1fr);
            gap: 0; /* Menghapus gap agar tidak ada pixel yang hilang */
            
            /* Border luar sisi atas dan kiri untuk container */
            border-top: 1px solid var(--primary);
            border-left: 1px solid var(--primary);
            background-color: var(--bg);
        }
        .grid-square {
            background-color: var(--bg);
            cursor: pointer;
            position: relative;
            
            /* Masing-masing kotak menggambar garis bawah dan kanannya sendiri */
            border-right: 1px solid var(--primary);
            border-bottom: 1px solid var(--primary);
        }
        .grid-square.filled {
            background-color: var(--fill-color);
            border-color: var(--fill-color);
            
            /* Box-shadow -1px kiri & atas untuk menutup border tetangga, sehingga solid/menyatu */
            box-shadow: -1px -1px 0 0 var(--fill-color); 
            z-index: 2;
        }

        #fence-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* 6 Cols x 2 Rows */
        .grid-toggles {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
        }
        .btn-toggle {
            border: none; 
            color: #ffffff; 
            font-size: 1.1rem;
            height: 38px;
            cursor: pointer;
            border-radius: 6px;
            transition: transform 0.1s;
        }
        .btn-toggle.active {
            box-shadow: inset 0 0 0 3px #fff;
            transform: scale(0.96);
        }
        .btn-tool {
            grid-column: span 3;
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary); 
            height: 38px;
        }
        .btn-tool.active {
            background: var(--primary);
            color: var(--bg);
            box-shadow: none;
            transform: none;
        }

        /* --- RIGHT COLUMN --- */
        .leaderboard-wrapper {
            height: 25%;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 10px;
            padding-bottom: 5px;
            overflow-y: auto;
        }
        .leaderboard-wrapper::-webkit-scrollbar { width: 6px; }
        .leaderboard-wrapper::-webkit-scrollbar-track { background: var(--bg); border-left: 1px solid var(--primary); }
        .leaderboard-wrapper::-webkit-scrollbar-thumb { background: var(--primary); }
        
        .lb-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 6px;
            font-size: 1.1rem;
            border-bottom: 1px dashed rgba(233, 232, 212, 0.2);
        }
        .lb-controls { display: flex; gap: 4px; }
        .lb-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            width: 26px; height: 26px;
            cursor: pointer;
            font-size: 1.1rem;
            border-radius: 4px;
        }
        .lb-btn:active { background: var(--primary); color: var(--bg); }

        .players-wrapper {
            height: 75%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 6px;
        }
        .player-box {
            border: 2px solid var(--primary);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            padding: 4px;
        }
        .player-name {
            background: transparent;
            border: none;
            border-bottom: 1px dashed var(--primary);
            color: var(--primary);
            text-align: center;
            font-size: 1rem;
            padding: 2px;
            text-transform: uppercase;
        }
        .player-time {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }
        .btn-bit {
            height: 38px;
            border: none;
            color: #ffffff; 
            font-size: 1.3rem;
            cursor: pointer;
            border-radius: 4px;
        }
        .btn-bit:active { transform: scale(0.96); }
        
        .verify-btns {
            display: flex;
            height: 38px;
            gap: 5px;
        }
        .verify-btns button {
            flex: 1;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 4px;
        }
        .verify-btns button.active-r { background: var(--verify-right); color: #fff; border-color: var(--verify-right); }
        .verify-btns button.active-w { background: var(--verify-wrong); color: #fff; border-color: var(--verify-wrong); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- LEFT COLUMN -->
    <div class="col col-left">
        <div class="header">
            <h1>SNACKE</h1>
        </div>
        <div class="timer-display" id="main-timer">00:00.000</div>
        <div class="main-controls">
            <button class="btn-ctrl" id="btn-start">START</button>
            <button class="btn-ctrl" id="btn-stop">STOP</button>
            <button class="btn-ctrl btn-bold" id="btn-next">NEXT<br>ROUND</button>
        </div>
        <div class="canvas-wrapper">
            <div class="canvas-inner" id="left-canvas-container">
                <canvas id="left-canvas"></canvas>
            </div>
            <div class="canvas-tools">
                <button id="l-pen" class="active">PEN</button>
                <button id="l-eraser">ERASER</button>
                <button id="l-clear">CLEAR</button>
            </div>
            <div class="canvas-tools">
                <button id="l-undo">UNDO</button>
                <button id="l-redo">REDO</button>
            </div>
        </div>
    </div>

    <!-- MIDDLE COLUMN -->
    <div class="col col-mid">
        <div class="grid-centering">
            <div class="grid-aspect-wrapper">
                <div class="grid-container" id="main-grid">
                    <!-- 144 Squares (12x12) -->
                </div>
                <canvas id="fence-canvas"></canvas>
            </div>
        </div>
        <div class="grid-toggles" id="grid-toggles">
            <!-- 12 Toggles (6x2) + Fence + Eraser -->
        </div>
    </div>

    <!-- RIGHT COLUMN -->
    <div class="col col-right">
        <div class="leaderboard-wrapper" id="leaderboard"></div>
        <div class="players-wrapper" id="players-grid"></div>
    </div>

    <script>
        // Harmonious floral/vibrant undertale palette, Lightness > 45%
        const PLAYER_COLORS =[
            '#528e86', '#cb929a', '#c24a1f', '#d44f58', '#e88e34', '#de6b8e', 
            '#5bb19c', '#f2b75b', '#85b967', '#b67cae', '#42a8c0', '#e06c53' 
        ];
        
        class Player {
            constructor(id, color) {
                this.id = id;
                this.color = color;
                this.name = `P${id+1}`;
                this.score = 0;
                this.recordedTime = null;
                this.isVerified = null; 
            }
        }

        const players = PLAYER_COLORS.map((color, i) => new Player(i, color));

        class Timer {
            constructor(el) {
                this.el = el;
                this.startTime = 0;
                this.elapsed = 0;
                this.interval = null;
            }
            start() {
                if(this.interval) return;
                this.startTime = Date.now() - this.elapsed;
                this.interval = setInterval(() => this.tick(), 10);
            }
            stop() {
                clearInterval(this.interval);
                this.interval = null;
            }
            reset() {
                this.stop();
                this.elapsed = 0;
                this.updateDisplay();
            }
            tick() {
                this.elapsed = Date.now() - this.startTime;
                this.updateDisplay();
            }
            updateDisplay() {
                let d = new Date(this.elapsed);
                let m = String(d.getUTCMinutes()).padStart(2, '0');
                let s = String(d.getUTCSeconds()).padStart(2, '0');
                let ms = String(d.getUTCMilliseconds()).padStart(3, '0');
                this.el.textContent = `${m}:${s}.${ms}`;
            }
            formatExternal(ms) {
                let d = new Date(ms);
                let m = String(d.getUTCMinutes()).padStart(2, '0');
                let s = String(d.getUTCSeconds()).padStart(2, '0');
                let milli = String(d.getUTCMilliseconds()).padStart(3, '0');
                return `${m}:${s}.${milli}`;
            }
        }
        const timer = new Timer(document.getElementById('main-timer'));

        class DrawingBoard {
            constructor(canvasId, containerId, defaultColor) {
                this.canvas = document.getElementById(canvasId);
                this.container = containerId ? document.getElementById(containerId) : this.canvas.parentElement;
                this.ctx = this.canvas.getContext('2d');
                this.isDrawing = false;
                this.mode = 'pen';
                this.color = defaultColor;
                
                this.history =[];
                this.historyStep = -1;

                const ro = new ResizeObserver(() => this.resize());
                ro.observe(this.container);
                
                this.bindEvents();
            }
            resize() {
                this.canvas.width = this.container.clientWidth;
                this.canvas.height = this.container.clientHeight;
                this.ctx.lineCap = 'round';
                this.ctx.lineJoin = 'round';
                if(this.historyStep === -1) this.saveState(); 
                else this.restoreState();
            }
            
            saveState() {
                this.historyStep++;
                this.history.length = this.historyStep; 
                this.history.push(this.canvas.toDataURL());
            }
            undo() {
                if (this.historyStep > 0) {
                    this.historyStep--;
                    this.restoreState();
                }
            }
            redo() {
                if (this.historyStep < this.history.length - 1) {
                    this.historyStep++;
                    this.restoreState();
                }
            }
            restoreState() {
                let img = new Image();
                img.src = this.history[this.historyStep];
                img.onload = () => {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    this.ctx.drawImage(img, 0, 0);
                };
            }

            setMode(mode) { this.mode = mode; }
            clear() { 
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); 
                this.saveState();
            }
            
            getPos(e) {
                const rect = this.canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            }

            startDraw(e) {
                this.isDrawing = true;
                const pos = this.getPos(e);
                this.ctx.beginPath();
                this.ctx.moveTo(pos.x, pos.y);
            }

            draw(e) {
                if (!this.isDrawing) return;
                e.preventDefault();
                const pos = this.getPos(e);
                
                if (this.mode === 'eraser') {
                    this.ctx.globalCompositeOperation = 'destination-out';
                    this.ctx.lineWidth = 30;
                } else {
                    this.ctx.globalCompositeOperation = 'source-over';
                    this.ctx.strokeStyle = this.color;
                    this.ctx.lineWidth = 4;
                }
                this.ctx.lineTo(pos.x, pos.y);
                this.ctx.stroke();
            }

            stopDraw() {
                if(!this.isDrawing) return;
                this.isDrawing = false;
                this.ctx.closePath();
                this.saveState(); 
            }

            bindEvents() {
                this.canvas.addEventListener('pointerdown', (e) => this.startDraw(e));
                this.canvas.addEventListener('pointermove', (e) => this.draw(e));
                this.canvas.addEventListener('pointerup', () => this.stopDraw());
                this.canvas.addEventListener('pointerout', () => this.stopDraw());
                
                this.canvas.addEventListener('touchstart', (e) => this.startDraw(e), {passive: false});
                this.canvas.addEventListener('touchmove', (e) => this.draw(e), {passive: false});
                this.canvas.addEventListener('touchend', () => this.stopDraw());
            }
        }

        const leftCanvas = new DrawingBoard('left-canvas', 'left-canvas-container', '#E9E8D4');
        const fenceCanvas = new DrawingBoard('fence-canvas', 'main-grid', '#E9E8D4');

        class GameEngine {
            constructor() {
                this.activeMiddleTool = null;
                this.initDOM();
                this.bindGlobalControls();
                this.renderLeaderboard();
            }

            initDOM() {
                // 144 squares (12x12)
                const gridContainer = document.getElementById('main-grid');
                for(let i=0; i<144; i++) {
                    let sq = document.createElement('div');
                    sq.className = 'grid-square';
                    sq.dataset.colorId = -1;
                    
                    sq.addEventListener('pointerdown', (e) => {
                        if(typeof this.activeMiddleTool === 'number') {
                            const pColor = players[this.activeMiddleTool].color;
                            if(sq.dataset.colorId == this.activeMiddleTool) {
                                sq.style.backgroundColor = '';
                                sq.classList.remove('filled');
                                sq.dataset.colorId = -1;
                            } else {
                                sq.style.backgroundColor = pColor;
                                sq.style.setProperty('--fill-color', pColor);
                                sq.classList.add('filled');
                                sq.dataset.colorId = this.activeMiddleTool;
                            }
                        }
                    });
                    gridContainer.appendChild(sq);
                }

                const togglesContainer = document.getElementById('grid-toggles');
                players.forEach(p => {
                    let btn = document.createElement('button');
                    btn.className = 'btn-toggle';
                    btn.style.backgroundColor = p.color;
                    btn.textContent = p.name;
                    btn.onclick = () => this.setMiddleTool(p.id, btn);
                    togglesContainer.appendChild(btn);
                });

                let btnFence = document.createElement('button');
                btnFence.className = 'btn-toggle btn-tool';
                btnFence.textContent = 'FENCE';
                btnFence.onclick = () => this.setMiddleTool('FENCE', btnFence);
                togglesContainer.appendChild(btnFence);

                let btnEraser = document.createElement('button');
                btnEraser.className = 'btn-toggle btn-tool';
                btnEraser.textContent = 'ERASER';
                btnEraser.onclick = () => this.setMiddleTool('ERASER', btnEraser);
                togglesContainer.appendChild(btnEraser);

                const playersGrid = document.getElementById('players-grid');
                players.forEach(p => {
                    let box = document.createElement('div');
                    box.className = 'player-box';
                    box.innerHTML = `
                        <input type="text" class="player-name" value="${p.name}" maxlength="5" data-id="${p.id}">
                        <div class="player-time" id="time-p${p.id}">--:--.---</div>
                        <button class="btn-bit" id="bit-p${p.id}" style="background-color: ${p.color}">BIT</button>
                        <div class="verify-btns hidden" id="verify-p${p.id}">
                            <button class="btn-r" onclick="game.verify(${p.id}, true)">✓</button>
                            <button class="btn-w" onclick="game.verify(${p.id}, false)">✕</button>
                        </div>
                    `;
                    playersGrid.appendChild(box);

                    box.querySelector('.player-name').addEventListener('input', (e) => {
                        p.name = e.target.value || `P${p.id+1}`;
                        togglesContainer.children[p.id].textContent = p.name;
                        this.renderLeaderboard();
                    });

                    box.querySelector('.btn-bit').addEventListener('pointerdown', () => this.recordTime(p.id));
                });
            }

            bindGlobalControls() {
                document.getElementById('btn-start').onclick = () => timer.start();
                document.getElementById('btn-stop').onclick = () => timer.stop();
                document.getElementById('btn-next').onclick = () => this.processNextRound();

                const lp = document.getElementById('l-pen');
                const le = document.getElementById('l-eraser');
                lp.onclick = () => { leftCanvas.setMode('pen'); lp.classList.add('active'); le.classList.remove('active'); };
                le.onclick = () => { leftCanvas.setMode('eraser'); le.classList.add('active'); lp.classList.remove('active'); };
                document.getElementById('l-clear').onclick = () => leftCanvas.clear();
                
                document.getElementById('l-undo').onclick = () => leftCanvas.undo();
                document.getElementById('l-redo').onclick = () => leftCanvas.redo();
            }

            setMiddleTool(toolId, btnEl) {
                this.activeMiddleTool = toolId;
                
                document.querySelectorAll('#grid-toggles .btn-toggle').forEach(b => b.classList.remove('active'));
                btnEl.classList.add('active');

                const fCanvas = document.getElementById('fence-canvas');
                if(toolId === 'FENCE') {
                    fCanvas.style.pointerEvents = 'auto';
                    fenceCanvas.setMode('pen');
                } else if(toolId === 'ERASER') {
                    fCanvas.style.pointerEvents = 'auto';
                    fenceCanvas.setMode('eraser');
                } else {
                    fCanvas.style.pointerEvents = 'none'; 
                }
            }

            recordTime(playerId) {
                if(!timer.interval && timer.elapsed === 0) return; 
                const p = players[playerId];
                if(p.recordedTime !== null) return; 

                p.recordedTime = timer.elapsed;
                document.getElementById(`time-p${playerId}`).textContent = timer.formatExternal(p.recordedTime);
                
                document.getElementById(`bit-p${playerId}`).classList.add('hidden');
                document.getElementById(`verify-p${playerId}`).classList.remove('hidden');
            }

            verify(playerId, isRight) {
                const p = players[playerId];
                const vDiv = document.getElementById(`verify-p${playerId}`);
                
                if(isRight) {
                    p.isVerified = true;
                    vDiv.querySelector('.btn-r').classList.add('active-r');
                    vDiv.querySelector('.btn-w').classList.remove('active-w');
                } else {
                    p.recordedTime = null;
                    p.isVerified = null;
                    
                    document.getElementById(`time-p${playerId}`).textContent = '--:--.---';
                    document.getElementById(`bit-p${playerId}`).classList.remove('hidden');
                    
                    vDiv.classList.add('hidden');
                    vDiv.querySelector('.btn-r').classList.remove('active-r');
                    vDiv.querySelector('.btn-w').classList.remove('active-w');
                }
            }

            changeScore(playerId, delta) {
                players[playerId].score += delta;
                this.renderLeaderboard();
            }

            processNextRound() {
                let validPlayers = players.filter(p => p.isVerified === true && p.recordedTime !== null);
                validPlayers.sort((a, b) => a.recordedTime - b.recordedTime);

                if(validPlayers.length > 0) validPlayers[0].score += 3;
                if(validPlayers.length > 1) validPlayers[1].score += 2;
                if(validPlayers.length > 2) validPlayers[2].score += 1;

                players.forEach(p => {
                    p.recordedTime = null;
                    p.isVerified = null;
                    
                    document.getElementById(`time-p${p.id}`).textContent = '--:--.---';
                    document.getElementById(`bit-p${p.id}`).classList.remove('hidden');
                    
                    const vDiv = document.getElementById(`verify-p${p.id}`);
                    vDiv.classList.add('hidden');
                    vDiv.querySelector('.btn-r').classList.remove('active-r');
                    vDiv.querySelector('.btn-w').classList.remove('active-w');
                });

                timer.reset();
                this.renderLeaderboard();
            }

            renderLeaderboard() {
                const lb = document.getElementById('leaderboard');
                lb.innerHTML = '';
                
                let sorted =[...players].sort((a,b) => b.score - a.score);
                
                sorted.forEach((p, index) => {
                    let row = document.createElement('div');
                    row.className = 'lb-row';
                    if(index === 0 && p.score > 0) row.style.color = '#f2b75b';
                    else if(index === 1 && p.score > 0) row.style.color = '#E9E8D4';
                    else if(index === 2 && p.score > 0) row.style.color = '#e88e34';

                    row.innerHTML = `
                        <div style="display:flex; align-items:center; gap: 8px;">
                            <span style="display:inline-block; width:12px; height:12px; background:${p.color}; border-radius:2px;"></span>
                            <span>${p.name}</span>
                        </div>
                        <div class="lb-controls">
                            <span style="width: 30px; text-align:right; margin-right: 5px;">${p.score}</span>
                            <button class="lb-btn" onclick="game.changeScore(${p.id}, 1)">+</button>
                            <button class="lb-btn" onclick="game.changeScore(${p.id}, -1)">-</button>
                        </div>
                    `;
                    lb.appendChild(row);
                });
            }
        }

        const game = new GameEngine();

    </script>
