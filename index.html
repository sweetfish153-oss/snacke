<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNACKE - Smart TV Game Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070808; /* Updated darker background */
            --primary: #E9E8D4;
            --verify-right: #13E19B;
            --verify-wrong: #F94627;
        }

        /* Base Setup & Typography */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg);
            color: var(--primary);
            font-family: 'Share Tech', sans-serif;
            overflow: hidden;
            display: flex;
            touch-action: none;
        }
        button, input {
            font-family: 'Share Tech', sans-serif;
            outline: none;
        }

        /* Layout Architecture (Ratios: 3 : 4 : 2 ) */
        .col {
            height: 100%;
            border-right: 2px solid var(--primary);
            display: flex;
            flex-direction: column;
            padding: 12px;
        }
        .col:last-child {
            border-right: none;
        }
        .col-left { flex: 3; }
        .col-mid { flex: 4; }
        .col-right { flex: 2; padding: 12px 8px; } /* Slightly narrower padding to fit 2/9 */

        /* --- LEFT COLUMN --- */
        .header h1 {
            text-align: center;
            font-size: 3rem;
            margin: 0 0 8px 0;
            letter-spacing: 5px;
            text-transform: uppercase;
        }
        .timer-display {
            font-size: 4rem;
            text-align: center;
            font-variant-numeric: tabular-nums;
            border: 2px solid var(--primary);
            padding: 5px;
            margin-bottom: 12px;
            border-radius: 8px;
        }
        .main-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .btn-ctrl {
            flex: 1;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            font-size: 1.3rem;
            height: 44px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-ctrl:active { background: var(--primary); color: var(--bg); }
        .btn-bold { 
            background: var(--primary); 
            color: var(--bg); 
            font-weight: bold; 
            line-height: 1; /* Reduced leading */
            padding: 0 5px;
        }
        .btn-bold:active { background: transparent; color: var(--primary); }

        .canvas-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            border: 2px solid var(--primary);
            position: relative;
            border-radius: 8px;
        }
        .canvas-inner { flex: 1; position: relative; }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }
        .canvas-tools {
            display: flex;
            border-top: 2px solid var(--primary);
        }
        .canvas-tools button {
            flex: 1;
            background: transparent;
            color: var(--primary);
            border: none;
            border-right: 2px solid var(--primary);
            height: 38px;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .canvas-tools button:last-child { border-right: none; }
        .canvas-tools button.active { background: var(--primary); color: var(--bg); }
        .canvas-tools button:active { opacity: 0.7; }

        /* --- MIDDLE COLUMN --- */
        .grid-centering {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            margin-bottom: 12px;
        }
        .grid-aspect-wrapper {
            height: 100%;
            aspect-ratio: 9 / 16;
            position: relative;
            background-color: var(--primary); /* Serves as 1px grid line */
            border: 1px solid var(--primary); /* Outer border ensures edges are seen */
        }
        .grid-container {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            grid-template-rows: repeat(16, 1fr);
            gap: 1px; /* The white grid outline */
        }
        .grid-square {
            background-color: var(--bg);
            cursor: pointer;
        }
        .grid-square.filled {
            box-shadow: 0 0 0 1px var(--fill-color); /* Overlap to cover 1px gap */
            position: relative;
            z-index: 2;
        }

        #fence-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* 6 Cols x 2 Rows */
        .grid-toggles {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
        }
        .btn-toggle {
            border: none; /* No outline normally */
            color: #ffffff; /* pure white text */
            font-size: 1.1rem;
            height: 38px;
            cursor: pointer;
            border-radius: 6px;
            transition: transform 0.1s;
        }
        .btn-toggle.active {
            box-shadow: inset 0 0 0 3px #fff;
            transform: scale(0.96);
        }
        .btn-tool {
            grid-column: span 3;
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary); /* Tools keep outline */
            height: 38px;
        }
        .btn-tool.active {
            background: var(--primary);
            color: var(--bg);
            box-shadow: none;
            transform: none;
        }

        /* --- RIGHT COLUMN --- */
        .leaderboard-wrapper {
            height: 25%;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 10px;
            padding-bottom: 5px;
            overflow-y: auto;
        }
        .leaderboard-wrapper::-webkit-scrollbar { width: 6px; }
        .leaderboard-wrapper::-webkit-scrollbar-track { background: var(--bg); border-left: 1px solid var(--primary); }
        .leaderboard-wrapper::-webkit-scrollbar-thumb { background: var(--primary); }
        
        .lb-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 6px;
            font-size: 1.1rem;
            border-bottom: 1px dashed rgba(233, 232, 212, 0.2);
        }
        .lb-controls { display: flex; gap: 4px; }
        .lb-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            width: 26px; height: 26px;
            cursor: pointer;
            font-size: 1.1rem;
            border-radius: 4px;
        }
        .lb-btn:active { background: var(--primary); color: var(--bg); }

        .players-wrapper {
            height: 75%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 6px;
        }
        .player-box {
            border: 2px solid var(--primary);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            padding: 4px;
        }
        .player-name {
            background: transparent;
            border: none;
            border-bottom: 1px dashed var(--primary);
            color: var(--primary);
            text-align: center;
            font-size: 1rem;
            padding: 2px;
            text-transform: uppercase;
        }
        .player-time {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }
        .btn-bit {
            height: 38px;
            border: none;
            color: #ffffff; /* pure white */
            font-size: 1.3rem;
            cursor: pointer;
            border-radius: 4px;
        }
        .btn-bit:active { transform: scale(0.96); }
        
        .verify-btns {
            display: flex;
            height: 38px;
            gap: 5px;
        }
        .verify-btns button {
            flex: 1;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 4px;
        }
        .verify-btns button.active-r { background: var(--verify-right); color: #fff; border-color: var(--verify-right); }
        .verify-btns button.active-w { background: var(--verify-wrong); color: #fff; border-color: var(--verify-wrong); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- LEFT COLUMN -->
    <div class="col col-left">
        <div class="header">
            <h1>SNACKE</h1>
        </div>
        <div class="timer-display" id="main-timer">00:00.000</div>
        <div class="main-controls">
            <button class="btn-ctrl" id="btn-start">START</button>
            <button class="btn-ctrl" id="btn-stop">STOP</button>
            <button class="btn-ctrl btn-bold" id="btn-next">NEXT<br>ROUND</button>
        </div>
        <div class="canvas-wrapper">
            <div class="canvas-inner" id="left-canvas-container">
                <canvas id="left-canvas"></canvas>
            </div>
            <!-- Tool Row 1: Pen, Eraser, Clear -->
            <div class="canvas-tools">
                <button id="l-pen" class="active">PEN</button>
                <button id="l-eraser">ERASER</button>
                <button id="l-clear">CLEAR</button>
            </div>
            <!-- Tool Row 2: Undo, Redo -->
            <div class="canvas-tools">
                <button id="l-undo">UNDO</button>
                <button id="l-redo">REDO</button>
            </div>
        </div>
    </div>

    <!-- MIDDLE COLUMN -->
    <div class="col col-mid">
        <div class="grid-centering">
            <!-- Wrapper applied with Aspect Ratio for Perfect Squares -->
            <div class="grid-aspect-wrapper">
                <div class="grid-container" id="main-grid">
                    <!-- 144 Squares -->
                </div>
                <canvas id="fence-canvas"></canvas>
            </div>
        </div>
        <div class="grid-toggles" id="grid-toggles">
            <!-- 12 Toggles (6x2) + Fence + Eraser will be injected here -->
        </div>
    </div>

    <!-- RIGHT COLUMN -->
    <div class="col col-right">
        <div class="leaderboard-wrapper" id="leaderboard"></div>
        <div class="players-wrapper" id="players-grid"></div>
    </div>

                this.isVerified = null; 
            }
        }

        const players = PLAYER_COLORS.map((color, i) => new Player(i, color));
